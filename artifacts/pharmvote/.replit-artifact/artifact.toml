kind = "web"
previewPath = "/"
title = "PharmSci E-Voting Platform"
version = "1.0.0"
id = "artifacts/pharmvote"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23656

[services.development]
run = "pnpm --filter @workspace/pharmvote run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pharmvote", "run", "build" ]
publicDir = "artifacts/pharmvote/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23656"
BASE_PATH = "/"
